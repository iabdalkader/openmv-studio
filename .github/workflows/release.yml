name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          if [ "$TAG" != "$VER" ]; then
            echo "ERROR: tag v${TAG} does not match tauri.conf.json version ${VER}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            libssl-dev \
            patchelf

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install smctl (Windows)
        if: runner.os == 'Windows'
        uses: digicert/ssm-code-signing@v1.0.1

      - name: Import Windows certificate
        if: runner.os == 'Windows'
        shell: bash
        env:
          SM_HOST: ${{ secrets.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          SM_CODE_SIGNING_CERT_SHA1_HASH: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}
        run: |
          export SM_CLIENT_CERT_FILE="$RUNNER_TEMP/certificate.p12"
          echo "$SM_CLIENT_CERT_FILE_B64" | base64 --decode > "$SM_CLIENT_CERT_FILE"
          echo "C:\Program Files (x86)\Windows Kits\10\App Certification Kit" >> "$GITHUB_PATH"
          sed -i "s/REPLACE_AT_BUILD_TIME/${SM_CODE_SIGNING_CERT_SHA1_HASH}/" src-tauri/tauri.conf.json
          smctl windows certsync

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenMV Studio ${{ github.ref_name }}"
          releaseBody: "See assets for download links."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build Arch Linux package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          scripts/build-arch-pkg.sh "$VER"
          gh release upload "$GITHUB_REF_NAME" openmv-studio-*.pkg.tar.zst --clobber
