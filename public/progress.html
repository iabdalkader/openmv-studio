<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e; color: #ccc;
      padding: 16px; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      user-select: none;
    }
    #status {
      font-size: 12px; color: #aaa; margin-bottom: 10px;
      min-height: 18px;
    }
    #log {
      flex: 1; overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11px; line-height: 1.6;
      color: #888; background: #161616;
      border-radius: 6px; padding: 8px 10px;
      border: 1px solid #2a2a2a;
    }
    #log div { white-space: pre-wrap; }
    #footer {
      display: flex; justify-content: flex-end;
      padding-top: 12px;
    }
    button {
      padding: 5px 20px; border-radius: 5px;
      border: 1px solid #444; background: #2a2a2a;
      color: #ccc; font-size: 12px; cursor: pointer;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <div id="status">Please wait...</div>
  <div id="log"></div>
  <div id="footer">
    <button id="btn-close" disabled>Close</button>
  </div>
  <script type="module">
    import { listen } from "https://unpkg.com/@tauri-apps/api@2/event";
    import { getCurrentWindow } from "https://unpkg.com/@tauri-apps/api@2/window";

    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const btnClose = document.getElementById("btn-close");

    listen("dfu-progress", (event) => {
      statusEl.textContent = event.payload;
      const line = document.createElement("div");
      line.textContent = event.payload;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    });

    listen("dfu-done", () => {
      btnClose.disabled = false;
    });

    btnClose.addEventListener("click", () => {
      getCurrentWindow().close();
    });
  </script>
</body>
</html>
